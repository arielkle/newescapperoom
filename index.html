<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדר בריחה דיגיטלי - פלטפורמת קישורים</title>
    
    <!-- ספריות עיצוב ופונטים -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #0b1120; color: #e2e8f0; overflow: hidden; }
        .theme-font { font-family: 'Courier New', Courier, monospace; letter-spacing: -0.5px; } 
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); } }
        .active-level { border-color: #06b6d4; background-color: #1e293b; animation: pulse-border 2s infinite; }

        .hotspot-edit { border: 3px solid #06b6d4; background: rgba(6, 182, 212, 0.2); box-shadow: 0 0 10px rgba(6,182,212,0.5); z-index: 10; cursor: crosshair; pointer-events: none; }
        .hotspot-play { border: 3px solid transparent; z-index: 10; cursor: pointer; transition: all 0.3s; }
        .hotspot-play:hover { border-color: rgba(6, 182, 212, 0.5); background: rgba(6, 182, 212, 0.1); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b1120; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #0284c7; }

        .image-display-area {
            position: relative;
            display: inline-block; 
            max-width: 100%;
        }
        
        #teacher-image, #student-image {
            max-width: 100%;
            max-height: calc(100vh - 380px); 
            object-fit: contain;
            display: block;
            background: #000;
        }

        .type-pill { transition: all 0.2s; cursor: pointer; border: 1px solid #334155; opacity: 0.6; }
        .type-pill.active { opacity: 1; border-color: #06b6d4; background-color: rgba(6, 182, 212, 0.1); }

        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #06b6d4;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden text-white">

    <!-- מסך פתיחה -->
    <div id="screen-intro" class="flex-1 flex flex-col items-center justify-center p-6 bg-slate-950 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 to-[#0b1120]">
        <i class="fas fa-link text-cyan-500 text-6xl mb-6 opacity-80"></i>
        <h1 class="text-6xl font-black text-cyan-400 mb-2 drop-shadow-[0_0_15px_rgba(6,182,212,0.5)] theme-font text-center">חדר בריחה ענן</h1>
        <p class="text-xl text-slate-400 mb-12 tracking-widest text-center">חוויה מהירה מבוססת קישורי Google Drive</p>
        
        <div class="grid md:grid-cols-2 gap-8 max-w-4xl w-full">
            <div class="bg-slate-900 rounded-3xl p-8 border border-slate-700 hover:border-indigo-500 transition-colors shadow-2xl flex flex-col items-center text-center relative overflow-hidden group">
                <div class="absolute inset-0 bg-indigo-500/5 group-hover:bg-indigo-500/10 transition-colors"></div>
                <div class="w-20 h-20 bg-indigo-900 border border-indigo-500 rounded-full flex items-center justify-center mb-6 shadow-[0_0_15px_rgba(99,102,241,0.5)] z-10 text-indigo-300">
                    <i class="fas fa-play text-3xl"></i>
                </div>
                <h2 class="text-3xl font-bold mb-4 z-10 text-indigo-100 text-center">אני תלמיד</h2>
                <p class="text-slate-400 mb-8 z-10 text-sm text-center">העלו את קובץ המשחק הקטן (JSON) שקיבלתם.</p>
                <label class="bg-indigo-600 hover:bg-indigo-500 border border-indigo-400 text-white px-8 py-4 rounded-xl font-bold text-xl cursor-pointer transition transform hover:scale-105 w-full block z-10 shadow-lg text-center">
                    טען משחק והתחל
                    <input type="file" class="hidden" accept=".json" onchange="handleLoadGame(event, 'STUDENT')">
                </label>
            </div>

            <div class="bg-slate-900 rounded-3xl p-8 border border-slate-700 hover:border-cyan-500 transition-colors shadow-2xl flex flex-col items-center text-center relative overflow-hidden group text-cyan-300">
                <div class="absolute inset-0 bg-cyan-500/5 group-hover:bg-cyan-500/10 transition-colors"></div>
                <div class="w-20 h-20 bg-cyan-900 border border-cyan-500 rounded-full flex items-center justify-center mb-6 shadow-[0_0_15px_rgba(6,182,212,0.5)] z-10">
                    <i class="fas fa-tools text-3xl text-cyan-300"></i>
                </div>
                <h2 class="text-3xl font-bold mb-4 z-10 text-cyan-100 text-center">אני מורה</h2>
                <div class="flex flex-col gap-3 w-full z-10 text-center">
                    <button onclick="createNewGame()" class="bg-cyan-700 hover:bg-cyan-600 border border-cyan-500 text-white px-8 py-4 rounded-xl font-bold text-xl cursor-pointer transition transform hover:scale-105 block shadow-lg text-center">
                        יצירת חדר חדש
                    </button>
                    <label class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-cyan-300 px-8 py-3 rounded-xl font-bold cursor-pointer transition block text-center">
                        המשך עריכה (JSON)
                        <input type="file" class="hidden" accept=".json" onchange="handleLoadGame(event, 'TEACHER')">
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- מסך עריכה -->
    <div id="screen-teacher" class="hidden flex-1 flex flex-col bg-[#0b1120] overflow-hidden h-screen">
        <header class="bg-slate-900 p-4 border-b border-slate-800 flex justify-between items-center shadow-lg z-30 shrink-0">
            <h1 class="text-2xl font-bold text-cyan-400 theme-font flex items-center gap-3">
                <i class="fas fa-cloud text-cyan-600"></i> עורך ענן
            </h1>
            <div class="flex gap-3 items-center">
                <button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-300 px-4 py-2 rounded-lg transition text-sm shadow-md">
                    <i class="fas fa-home"></i> בית
                </button>
                <div class="w-px h-6 bg-slate-700"></div>
                <button onclick="previewGame()" class="bg-indigo-600 hover:bg-indigo-500 border border-indigo-400 text-white px-4 py-2 rounded-lg transition text-sm shadow-md">
                    <i class="fas fa-play"></i> תצוגת תלמיד
                </button>
                <button onclick="saveProjectFile()" class="bg-cyan-700 hover:bg-cyan-600 border border-cyan-500 text-white px-6 py-2 rounded-lg transition text-sm font-bold shadow-lg">
                    <i class="fas fa-save"></i> שמירה
                </button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden min-h-0">
            <aside class="w-72 bg-slate-900 border-l border-slate-800 p-4 flex flex-col gap-4 z-20 shrink-0 h-full overflow-hidden text-center">
                <div class="flex justify-between items-center mb-2 shrink-0">
                    <h2 class="font-bold text-lg text-slate-300 uppercase tracking-widest text-sm">שלבי החדר</h2>
                    <button onclick="addNewLevelPrompt()" class="bg-cyan-700 hover:bg-cyan-600 border border-cyan-500 w-8 h-8 rounded-full cursor-pointer flex items-center justify-center text-white transition hover:scale-110">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div id="teacher-sidebar-levels" class="space-y-4 overflow-y-auto flex-1 pr-2 pb-10 min-h-0"></div>
            </aside>

            <main class="flex-1 overflow-y-auto p-4 bg-[#0b1120] shadow-inner flex flex-col items-center">
                <div id="teacher-main-content" class="max-w-5xl mx-auto flex-1 flex flex-col items-center gap-4 w-full">
                    
                    <!-- הזנת קישור לתמונה/גיף -->
                    <div class="w-full bg-slate-900/80 p-4 rounded-xl border border-slate-700 shadow-xl shrink-0">
                        <label class="text-[10px] font-bold text-cyan-500 uppercase flex items-center gap-2 mb-2">קישור ל-GIF (גוגל דרייב או כתובת ישירה):</label>
                        <div class="flex gap-2">
                            <input id="teacher-input-url" type="text" class="flex-1 bg-[#0b1120] border border-slate-700 rounded-lg px-4 py-2 text-cyan-300 focus:ring-1 focus:ring-cyan-500 outline-none" placeholder="הדביקו קישור כאן...">
                            <button onclick="updateImageFromUrl()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-xs font-bold border border-slate-600">עדכן תמונה</button>
                        </div>
                    </div>

                    <div id="teacher-type-selector" class="w-full flex justify-center gap-4 bg-slate-900/50 p-2 rounded-2xl border border-slate-800 shrink-0">
                        <div onclick="setLevelType('intro')" id="type-intro" class="type-pill px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2">תמונת פתיחה</div>
                        <div onclick="setLevelType('puzzle')" id="type-puzzle" class="type-pill px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2">חידת קוד</div>
                        <div onclick="setLevelType('end')" id="type-end" class="type-pill px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2">תמונת סיום</div>
                    </div>

                    <div class="flex-1 flex items-center justify-center w-full bg-black/40 rounded-xl overflow-visible">
                        <div id="teacher-image-wrapper" class="image-display-area shadow-2xl" onmousedown="startHotspotDraw(event)" onmousemove="updateHotspotDraw(event)">
                            <img id="teacher-image" src="" draggable="false" class="opacity-95 pointer-events-none select-none" onerror="this.src='https://placehold.co/600x400/0b1120/06b6d4?text=No+Image+Found'">
                            <div id="teacher-hotspot" class="absolute hotspot-edit"></div>
                        </div>
                    </div>

                    <div id="teacher-edit-panel" class="w-full bg-slate-900/80 p-5 rounded-xl border border-slate-700 grid grid-cols-2 gap-4 shadow-xl shrink-0 backdrop-blur-sm">
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold text-cyan-500 uppercase">שאלה:</label>
                            <textarea id="teacher-input-question" rows="2" class="bg-[#0b1120] border border-slate-700 rounded-lg px-4 py-2 text-slate-200 focus:outline-none resize-none text-sm"></textarea>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold text-cyan-500 uppercase">תשובה:</label>
                            <input id="teacher-input-answer" type="text" class="bg-[#0b1120] border border-slate-700 rounded-lg px-4 py-2 text-cyan-300 h-full focus:ring-1 focus:ring-cyan-500 theme-font text-base">
                        </div>
                    </div>
                    
                    <div id="teacher-nav-msg" class="hidden w-full bg-indigo-900/40 p-3 rounded-xl border border-indigo-700 text-center shadow-xl shrink-0 backdrop-blur-sm">
                        <p id="nav-msg-text" class="text-indigo-200 font-bold text-xs"></p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- מסך תלמיד -->
    <div id="screen-student" class="hidden flex-1 flex flex-col bg-[#0b1120] overflow-hidden h-screen relative">
        <header class="bg-slate-900/90 backdrop-blur-md p-4 border-b border-cyan-900/50 flex justify-between items-center shadow-lg z-30 shrink-0">
            <h1 class="font-bold text-cyan-400 theme-font text-3xl tracking-widest flex items-center gap-3">
                <i class="fas fa-lock-open"></i> חדר בריחה
            </h1>
            <div class="flex items-center gap-4">
                <button id="btn-back-to-edit" onclick="returnToEditor()" class="hidden bg-slate-800 hover:bg-slate-700 border border-slate-500 text-slate-300 px-4 py-2 rounded-lg flex items-center gap-2 transition text-sm">
                    <i class="fas fa-arrow-right"></i> חזרה לעריכה
                </button>
                <div id="student-progress-text" class="text-cyan-100 font-bold bg-[#0b1120] border border-cyan-800 px-6 py-2 rounded-full text-sm tracking-wide shadow-lg"></div>
            </div>
        </header>

        <main class="flex-1 overflow-hidden p-4 md:p-8 flex flex-col items-center justify-center relative z-10 text-center">
            <div class="image-display-area group">
                <img id="student-image" src="" draggable="false" class="shadow-[0_0_50px_rgba(0,0,0,0.9)] border-2 border-slate-700 rounded-xl select-none pointer-events-none">
                <div id="student-hotspot" class="absolute hotspot-play" onclick="handleImageClick()"></div>
            </div>
            <div id="student-hint-text" class="mt-8 text-slate-500 theme-font text-xs tracking-widest uppercase text-center opacity-60"></div>
        </main>
    </div>

    <!-- מודאל שאלה -->
    <div id="modal-lock" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md">
        <div class="bg-slate-900 p-8 rounded-2xl border border-cyan-800 max-w-md w-full text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-cyan-500 shadow-[0_0_15px_rgba(6,182,212,1)]"></div>
            <h2 class="theme-font text-2xl font-bold text-cyan-400 mb-6 tracking-widest uppercase">הזנת קוד גישה</h2>
            <p id="modal-question" class="text-lg mb-8 leading-relaxed text-slate-300 bg-slate-800/50 p-6 rounded-lg border border-slate-700"></p>
            <div class="space-y-6">
                <input id="modal-input" type="text" placeholder="הקלידו תשובה..." autocomplete="off" class="w-full bg-[#0b1120] border-2 border-slate-700 focus:border-cyan-500 rounded-xl px-6 py-4 text-center text-2xl theme-font text-cyan-300 font-bold outline-none">
                <div id="modal-feedback" class="hidden font-bold py-2 rounded-lg text-sm theme-font tracking-wider"></div>
                <div class="flex gap-4">
                    <button onclick="checkAnswer()" class="flex-1 bg-cyan-700 hover:bg-cyan-600 text-white font-bold py-4 rounded-xl transition shadow-lg text-lg uppercase">אימות</button>
                    <button onclick="closeModal()" class="px-6 bg-slate-800 text-slate-400 rounded-xl border border-slate-700"><i class="fas fa-times"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- מסך ניצחון -->
    <div id="screen-victory" class="hidden fixed inset-0 bg-[#0b1120] z-[200] flex flex-col items-center justify-center text-center p-8 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 to-[#0b1120]">
        <div class="relative mb-10"><i class="fas fa-check text-9xl text-cyan-400 drop-shadow-[0_0_25px_rgba(6,182,212,0.8)]"></i></div>
        <h1 class="theme-font text-7xl font-bold text-cyan-400 mb-6 uppercase tracking-widest">יצאתם לחופשי! 🏆</h1>
        <p class="text-xl text-slate-400 mb-12 max-w-lg mx-auto">כל הכבוד, פיצחתם את כל החידות בהצלחה!</p>
        <div class="flex gap-4 justify-center">
            <button onclick="location.reload()" class="bg-transparent border-2 border-cyan-600 text-cyan-400 px-10 py-3 rounded-full font-bold text-lg hover:bg-cyan-900/30 transition">חזרה להתחלה</button>
            <button id="btn-victory-back-edit" onclick="returnToEditor()" class="hidden bg-indigo-600 text-white px-10 py-3 rounded-full font-bold text-lg shadow-lg transition">חזרה לעריכה</button>
        </div>
    </div>

    <footer class="p-2 bg-slate-950/90 border-t border-slate-900 flex flex-col items-center shrink-0 z-50 text-center">
        <p class="text-[10px] text-slate-500 theme-font tracking-wide">אריאל קלפנר, טכנופדגוגיה ובינה מלאכותית</p>
    </footer>

    <script>
        let userRole = null; 
        let levels = [];
        let currentLevelIndex = 0;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };

        const screens = {
            intro: document.getElementById('screen-intro'),
            teacher: document.getElementById('screen-teacher'),
            student: document.getElementById('screen-student'),
            victory: document.getElementById('screen-victory'),
            modal: document.getElementById('modal-lock')
        };

        const teacherDOM = {
            sidebar: document.getElementById('teacher-sidebar-levels'),
            mainContent: document.getElementById('teacher-main-content'),
            img: document.getElementById('teacher-image'),
            hotspot: document.getElementById('teacher-hotspot'),
            inputQ: document.getElementById('teacher-input-question'),
            inputA: document.getElementById('teacher-input-answer'),
            inputUrl: document.getElementById('teacher-input-url'),
            editPanel: document.getElementById('teacher-edit-panel'),
            navMsg: document.getElementById('teacher-nav-msg'),
            navText: document.getElementById('nav-msg-text')
        };

        const studentDOM = {
            progress: document.getElementById('student-progress-text'),
            img: document.getElementById('student-image'),
            hotspot: document.getElementById('student-hotspot'),
            hint: document.getElementById('student-hint-text'),
            modalInput: document.getElementById('modal-input'),
            modalQ: document.getElementById('modal-question'),
            modalFeedback: document.getElementById('modal-feedback')
        };

        // פונקציית קסם למעבר מקישור דרייב לתמונה ישירה
        function formatDriveLink(url) {
            if (!url) return '';
            if (url.includes('drive.google.com')) {
                // חילוץ ה-ID של הקובץ מהקישור
                const match = url.match(/\/d\/(.+?)\/(view|edit|usp)/) || url.match(/id=(.+?)(&|$)/);
                if (match && match[1]) {
                    return `https://lh3.googleusercontent.com/u/0/d/${match[1]}`;
                }
            }
            return url;
        }

        function showScreen(screenName) {
            Object.values(screens).forEach(s => { if (s) s.classList.add('hidden'); });
            if (screens[screenName]) screens[screenName].classList.remove('hidden');
        }

        function setLevelType(type) {
            if (!levels[currentLevelIndex]) return;
            levels[currentLevelIndex].type = type;
            renderTeacherUI();
        }

        function handleImageClick() {
            const level = levels[currentLevelIndex];
            if (!level) return;
            if (level.type === 'intro') {
                if (currentLevelIndex < levels.length - 1) { currentLevelIndex++; renderStudentUI(); }
                else showScreen('victory');
            } else if (level.type === 'end') showScreen('victory');
            else openModal();
        }

        function openModal() {
            const current = levels[currentLevelIndex];
            studentDOM.modalQ.innerText = current.question || "מהו הקוד?";
            studentDOM.modalInput.value = "";
            studentDOM.modalFeedback.className = 'hidden';
            if (screens.modal) screens.modal.classList.remove('hidden');
            setTimeout(() => { if (studentDOM.modalInput) studentDOM.modalInput.focus(); }, 100);
        }

        function closeModal() { if (screens.modal) screens.modal.classList.add('hidden'); }

        function previewGame() {
            if (levels.length === 0) return;
            currentLevelIndex = 0;
            document.getElementById('btn-back-to-edit').classList.remove('hidden');
            document.getElementById('btn-victory-back-edit').classList.remove('hidden');
            renderStudentUI();
            showScreen('student');
        }

        function returnToEditor() { showScreen('teacher'); renderTeacherUI(); }

        function createNewGame() {
            userRole = 'TEACHER';
            levels = [];
            currentLevelIndex = 0;
            addNewLevelPrompt();
            showScreen('teacher');
        }

        function handleLoadGame(event, role) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    let data = JSON.parse(e.target.result);
                    levels = Array.isArray(data) ? data : (data.levels || []);
                    currentLevelIndex = 0;
                    userRole = role;
                    if(role === 'TEACHER') { showScreen('teacher'); renderTeacherUI(); }
                    else { showScreen('student'); renderStudentUI(); }
                } catch (err) { alert("קובץ לא תקין."); }
            };
            reader.readAsText(file);
        }

        function updateImageFromUrl() {
            const url = teacherDOM.inputUrl.value.trim();
            if (!url || !levels[currentLevelIndex]) return;
            levels[currentLevelIndex].image = formatDriveLink(url);
            renderTeacherUI();
        }

        function addNewLevelPrompt() {
            const newLevel = {
                id: Date.now(),
                image: '', 
                type: 'puzzle', 
                question: 'מהו הקוד למנעול?',
                answer: '',
                hotspot: { x: 40, y: 40, width: 20, height: 20 }
            };
            if (levels.length === 0) { levels.push(newLevel); currentLevelIndex = 0; }
            else { levels.splice(currentLevelIndex + 1, 0, newLevel); currentLevelIndex++; }
            renderTeacherUI();
        }

        function renderTeacherUI() {
            if (levels.length === 0) {
                teacherDOM.mainContent.style.visibility = 'hidden';
                teacherDOM.sidebar.innerHTML = '<p class="text-slate-500 text-center text-sm mt-10">אין שלבים</p>';
                return;
            }
            teacherDOM.mainContent.style.visibility = 'visible';
            
            teacherDOM.sidebar.innerHTML = '';
            levels.forEach((lvl, idx) => {
                const div = document.createElement('div');
                div.className = `group relative p-2 rounded-xl border border-slate-700 cursor-pointer transition-all ${currentLevelIndex === idx ? 'active-level' : 'bg-slate-800'}`;
                div.onclick = () => { currentLevelIndex = idx; renderTeacherUI(); };
                div.innerHTML = `
                    <div class="w-full h-16 bg-center bg-cover bg-no-repeat rounded-md mb-1 bg-black" style="background-image: url('${lvl.image}')"></div>
                    <div class="text-[10px] font-bold text-center uppercase">שלב ${idx + 1}</div>
                    <button onclick="event.stopPropagation(); removeLevel(${idx})" class="absolute top-2 left-2 bg-red-600/80 p-1.5 rounded opacity-0 group-hover:opacity-100 transition"><i class="fas fa-trash text-xs text-white"></i></button>`;
                teacherDOM.sidebar.appendChild(div);
            });

            const current = levels[currentLevelIndex];
            teacherDOM.img.src = current.image || 'https://placehold.co/600x400/0b1120/06b6d4?text=Paste+Link+Above';
            teacherDOM.inputUrl.value = current.image;
            
            document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('active'));
            const activePill = document.getElementById(`type-${current.type}`);
            if (activePill) activePill.classList.add('active');

            updateHotspotVisual(teacherDOM.hotspot, current.hotspot);

            if (current.type === 'puzzle') {
                teacherDOM.editPanel.classList.remove('hidden');
                teacherDOM.navMsg.classList.add('hidden');
                teacherDOM.inputQ.value = current.question || "";
                teacherDOM.inputA.value = current.answer || "";
            } else {
                teacherDOM.editPanel.classList.add('hidden');
                teacherDOM.navMsg.classList.remove('hidden');
                teacherDOM.navText.innerHTML = current.type === 'intro' ? "תמונת פתיחה - סמנו אזור שקוף למעבר" : "תמונת סיום - סמנו אזור שקוף לסגירה";
            }
        }

        function removeLevel(index) {
            levels.splice(index, 1);
            if (currentLevelIndex >= levels.length && levels.length > 0) currentLevelIndex = levels.length - 1;
            renderTeacherUI();
        }

        function saveProjectFile() {
            if (levels.length === 0) return;
            const blob = new Blob([JSON.stringify(levels)], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'escape-room-cloud.json';
            link.click();
        }

        function renderStudentUI() {
            const current = levels[currentLevelIndex];
            if (!current) return;
            const puzzleCount = levels.filter(l => l.type === 'puzzle').length;
            const currentPuzzleIdx = levels.slice(0, currentLevelIndex + 1).filter(l => l.type === 'puzzle').length;

            studentDOM.progress.innerText = current.type === 'puzzle' ? `חידה ${currentPuzzleIdx} / ${puzzleCount}` : (current.type === 'intro' ? 'פתיחה' : 'סיום');
            studentDOM.hint.innerText = current.type === 'puzzle' ? "מצאו את המנעול בתוך ה-GIF" : "לחצו על האזור השקוף להמשך";
            
            studentDOM.img.src = current.image;
            updateHotspotVisual(studentDOM.hotspot, current.hotspot);
        }

        function updateHotspotVisual(el, data) {
            if (!el || !data) return;
            el.style.top = data.y + "%"; el.style.left = data.x + "%";
            el.style.width = data.width + "%"; el.style.height = data.height + "%";
        }

        function startHotspotDraw(e) {
            if(userRole !== 'TEACHER') return;
            e.preventDefault();
            const rect = teacherDOM.img.getBoundingClientRect();
            dragStart.x = ((e.clientX - rect.left) / rect.width) * 100;
            dragStart.y = ((e.clientY - rect.top) / rect.height) * 100;
            isDragging = true;
            levels[currentLevelIndex].hotspot = { x: dragStart.x, y: dragStart.y, width: 0, height: 0 };
            updateHotspotVisual(teacherDOM.hotspot, levels[currentLevelIndex].hotspot);
        }

        function updateHotspotDraw(e) {
            if(!isDragging) return;
            const rect = teacherDOM.img.getBoundingClientRect();
            const curX = ((e.clientX - rect.left) / rect.width) * 100;
            const curY = ((e.clientY - rect.top) / rect.height) * 100;
            const x = Math.max(0, Math.min(100, Math.min(dragStart.x, curX)));
            const y = Math.max(0, Math.min(100, Math.min(dragStart.y, curY)));
            levels[currentLevelIndex].hotspot = { 
                x: x, y: y,
                width: Math.min(Math.abs(curX - dragStart.x), 100 - x),
                height: Math.min(Math.abs(curY - dragStart.y), 100 - y)
            };
            updateHotspotVisual(teacherDOM.hotspot, levels[currentLevelIndex].hotspot);
        }

        function checkAnswer() {
            const current = levels[currentLevelIndex];
            const input = studentDOM.modalInput.value.trim().toLowerCase();
            const correct = (current.answer || "").trim().toLowerCase();
            const fb = studentDOM.modalFeedback;
            if (input === correct || (correct.length > 2 && input.includes(correct))) {
                fb.innerText = "נכון!";
                fb.className = "mt-2 text-green-400 block";
                fb.classList.remove('hidden');
                setTimeout(() => { 
                    closeModal(); 
                    if (currentLevelIndex < levels.length - 1) { currentLevelIndex++; renderStudentUI(); }
                    else showScreen('victory');
                }, 1000);
            } else {
                fb.innerText = "לא נכון!";
                fb.className = "mt-2 text-red-400 block animate-shake";
                fb.classList.remove('hidden');
                setTimeout(() => fb.classList.add('hidden'), 1000);
            }
        }

        window.onmouseup = () => isDragging = false;
        teacherDOM.inputQ.oninput = (e) => levels[currentLevelIndex].question = e.target.value;
        teacherDOM.inputA.oninput = (e) => levels[currentLevelIndex].answer = e.target.value;
        studentDOM.modalInput.onkeypress = (e) => { if (e.key === 'Enter') checkAnswer(); };
    </script>
</body>
</html>
