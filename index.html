<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדר בריחה דיגיטלי - גרסת ZIP</title>
    
    <!-- CSS ספריות -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- JSZip ספריה ליצירת וקריאת קובצי ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #0b1120; color: #e2e8f0; overflow: hidden; }
        .theme-font { font-family: 'Courier New', Courier, monospace; letter-spacing: -0.5px; } 
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); } }
        .active-level { border-color: #06b6d4 !important; background-color: #1e293b !important; animation: pulse-border 2s infinite; }

        .hotspot-edit { border: 3px solid #06b6d4; background: rgba(6, 182, 212, 0.2); box-shadow: 0 0 10px rgba(6,182,212,0.5); z-index: 10; cursor: crosshair; pointer-events: none; }
        .hotspot-play { border: 3px solid transparent; z-index: 10; cursor: pointer; transition: all 0.3s; }
        .hotspot-play:hover { border-color: rgba(6, 182, 212, 0.5); background: rgba(6, 182, 212, 0.1); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b1120; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 4px; }

        .image-display-area { position: relative; display: inline-block; max-width: 100%; }
        
        /* הפרדה בין תצוגת מורה לתצוגת תלמיד - התלמיד מקבל מסך כמעט מלא */
        #teacher-image { max-width: 100%; max-height: calc(100vh - 380px); object-fit: contain; display: block; background: #000; }
        #student-image { max-width: 98vw; max-height: calc(100vh - 120px); object-fit: contain; display: block; background: #000; }

        .type-pill { transition: all 0.2s; cursor: pointer; border: 1px solid #334155; opacity: 0.6; }
        .type-pill.active { opacity: 1; border-color: #06b6d4; background-color: rgba(6, 182, 212, 0.1); }

        .loading-overlay { background: rgba(11, 17, 32, 0.9); backdrop-blur: 10px; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden text-white">

    <!-- מסך טעינה -->
    <div id="loading-screen" class="hidden fixed inset-0 z-[1000] loading-overlay flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p id="loading-text" class="theme-font text-cyan-400 tracking-widest uppercase text-center mt-4">טוען...</p>
    </div>

    <!-- מסך פתיחה -->
    <div id="screen-intro" class="flex-1 flex flex-col items-center justify-center p-6 bg-slate-950 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 to-[#0b1120]">
        <i class="fas fa-file-archive text-cyan-500 text-6xl mb-6 opacity-80"></i>
        <h1 class="text-6xl font-black text-cyan-400 mb-2 drop-shadow-[0_0_15px_rgba(6,182,212,0.5)] theme-font text-center">חדר בריחה דיגיטלי</h1>
        <p class="text-xl text-slate-400 mb-12 tracking-widest text-center">משחק אופליין באמצעות קובצי ZIP</p>
        
        <div class="grid md:grid-cols-2 gap-8 max-w-4xl w-full">
            <!-- צד תלמיד -->
            <div class="bg-slate-900 rounded-3xl p-8 border border-slate-700 hover:border-indigo-500 transition-colors shadow-2xl flex flex-col items-center text-center group">
                <div class="w-20 h-20 bg-indigo-900 border border-indigo-500 rounded-full flex items-center justify-center mb-6 text-indigo-300">
                    <i class="fas fa-user-graduate text-3xl"></i>
                </div>
                <h2 class="text-3xl font-bold mb-4 z-10 text-indigo-100 text-center">אני תלמיד</h2>
                <div class="w-full space-y-4">
                    <p class="text-slate-400 mb-4 text-sm text-center">העלו את קובץ ה-ZIP שקיבלתם מהמורה.</p>
                    <label class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-4 rounded-xl font-bold text-xl cursor-pointer transition transform hover:scale-105 w-full block shadow-lg">
                        טען משחק (.zip)
                        <input type="file" class="hidden" accept=".zip" onchange="handleLoadZip(event, 'STUDENT')">
                    </label>
                </div>
            </div>

            <!-- צד מורה -->
            <div class="bg-slate-900 rounded-3xl p-8 border border-slate-700 hover:border-cyan-500 transition-colors shadow-2xl flex flex-col items-center text-center group text-cyan-300">
                <div class="w-20 h-20 bg-cyan-900 border border-cyan-500 rounded-full flex items-center justify-center mb-6">
                    <i class="fas fa-chalkboard-teacher text-3xl text-cyan-300"></i>
                </div>
                <h2 class="text-3xl font-bold mb-4 z-10 text-cyan-100 text-center">אני מורה</h2>
                <div class="flex flex-col gap-3 w-full">
                    <label class="bg-cyan-700 hover:bg-cyan-600 text-white px-8 py-4 rounded-xl font-bold text-xl cursor-pointer transition transform hover:scale-105 block shadow-lg text-center">
                        צור חדר חדש (GIF)
                        <input type="file" class="hidden" accept="image/gif,image/jpeg,image/png" onchange="handleNewGame(event)">
                    </label>
                    <p class="text-[10px] text-slate-500 uppercase mt-2">המשך עריכת חדר קיים:</p>
                    <label class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-cyan-300 px-8 py-3 rounded-xl font-bold cursor-pointer transition block text-center">
                        פתח חדר מ-ZIP
                        <input type="file" class="hidden" accept=".zip" onchange="handleLoadZip(event, 'TEACHER')">
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- מסך מורה -->
    <div id="screen-teacher" class="hidden flex-1 flex flex-col bg-[#0b1120] overflow-hidden h-screen">
        <header class="bg-slate-900 p-4 border-b border-slate-800 flex justify-between items-center shadow-lg z-30 shrink-0">
            <h1 class="text-2xl font-bold text-cyan-400 theme-font flex items-center gap-2">
                <i class="fas fa-edit"></i> עורך חדר בריחה
            </h1>
            <div class="flex gap-3 items-center">
                <button onclick="location.reload()" class="bg-slate-800 text-slate-300 px-4 py-2 rounded-lg text-sm">בית</button>
                <div class="w-px h-6 bg-slate-700"></div>
                <button onclick="previewGame()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm">תצוגת תלמיד</button>
                <button onclick="saveToZip()" class="bg-cyan-700 hover:bg-cyan-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg flex items-center gap-2">
                    <i class="fas fa-download"></i> שמור כ-ZIP
                </button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden min-h-0">
            <!-- סרגל צד (תצוגת שקפים מימין) -->
            <aside class="w-80 bg-slate-900 border-l border-slate-800 p-4 flex flex-col gap-4 z-20 shrink-0 h-full overflow-hidden text-center">
                <div class="flex justify-between items-center mb-2 shrink-0">
                    <h2 class="font-bold text-lg text-slate-300 uppercase tracking-widest text-sm">שקפים</h2>
                    <label class="bg-cyan-700 hover:bg-cyan-600 border border-cyan-500 w-8 h-8 rounded-full cursor-pointer flex items-center justify-center text-white transition hover:scale-110">
                        <i class="fas fa-plus"></i>
                        <input type="file" class="hidden" accept="image/gif,image/jpeg,image/png" onchange="addLevelFromFile(event)">
                    </label>
                </div>
                <div id="teacher-sidebar-levels" class="space-y-4 overflow-y-auto flex-1 pr-2 pb-10 min-h-0"></div>
            </aside>

            <!-- אזור ראשי -->
            <main class="flex-1 overflow-y-auto p-4 bg-[#0b1120] flex flex-col items-center">
                <div id="teacher-main-content" class="max-w-5xl mx-auto flex-1 flex flex-col items-center gap-4 w-full">
                    
                    <div id="teacher-type-selector" class="w-full flex justify-center gap-4 bg-slate-900/50 p-2 rounded-2xl border border-slate-800 shrink-0">
                        <button onclick="setLevelType('intro')" id="type-btn-intro" class="type-pill px-4 py-2 rounded-xl text-sm font-bold">תמונת פתיחה</button>
                        <button onclick="setLevelType('puzzle')" id="type-btn-puzzle" class="type-pill px-4 py-2 rounded-xl text-sm font-bold">חידת קוד</button>
                        <button onclick="setLevelType('end')" id="type-btn-end" class="type-pill px-4 py-2 rounded-xl text-sm font-bold">תמונת סיום</button>
                    </div>

                    <div class="flex-1 flex items-center justify-center w-full bg-black/40 rounded-xl overflow-visible">
                        <div id="teacher-image-wrapper" class="image-display-area shadow-2xl" onmousedown="startHotspotDraw(event)" onmousemove="updateHotspotDraw(event)">
                            <img id="teacher-image" src="" draggable="false" class="opacity-95 pointer-events-none select-none">
                            <div id="teacher-hotspot" class="absolute hotspot-edit"></div>
                            
                            <label class="absolute top-4 left-4 z-50 bg-black/60 hover:bg-black/80 backdrop-blur-md px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20 text-white shadow-lg cursor-pointer transition flex items-center gap-2">
                                <i class="fas fa-sync-alt"></i> החלף GIF
                                <input type="file" class="hidden" accept="image/gif,image/jpeg,image/png" onchange="replaceImageFromFile(event)">
                            </label>
                        </div>
                    </div>

                    <div id="teacher-edit-panel" class="w-full bg-slate-900/80 p-5 rounded-xl border border-slate-700 grid grid-cols-2 gap-4 shadow-xl shrink-0 backdrop-blur-sm">
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold text-cyan-500 uppercase">שאלה לתלמיד:</label>
                            <textarea id="teacher-input-question" rows="2" class="bg-[#0b1120] border border-slate-700 rounded-lg px-4 py-2 text-slate-200 focus:outline-none resize-none text-sm"></textarea>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold text-cyan-500 uppercase">קוד הפתרון:</label>
                            <input id="teacher-input-answer" type="text" class="bg-[#0b1120] border border-slate-700 rounded-lg px-4 py-2 text-cyan-300 h-full focus:ring-1 focus:ring-cyan-500 theme-font text-base">
                        </div>
                    </div>
                    
                    <div id="teacher-nav-msg" class="hidden w-full bg-indigo-900/40 p-3 rounded-xl border border-indigo-700 text-center shadow-xl shrink-0 backdrop-blur-sm">
                        <p id="nav-msg-text" class="text-indigo-200 font-bold text-xs"></p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- מסך תלמיד -->
    <div id="screen-student" class="hidden flex-1 flex flex-col bg-[#0b1120] overflow-hidden h-screen relative">
        <header class="bg-slate-900/90 backdrop-blur-md py-2 px-4 border-b border-cyan-900/50 flex justify-between items-center shadow-lg z-30 shrink-0">
            <h1 class="font-bold text-cyan-400 theme-font text-2xl tracking-widest flex items-center gap-3">
                <i class="fas fa-lock-open"></i> חדר בריחה
            </h1>
            <div class="flex items-center gap-4">
                <button id="btn-back-to-edit" onclick="returnToEditor()" class="hidden bg-slate-800 hover:bg-slate-700 border border-slate-500 text-slate-300 px-4 py-1.5 rounded-lg text-xs">
                    <i class="fas fa-arrow-right"></i> חזרה לעריכה
                </button>
                <div id="student-progress-text" class="text-cyan-100 font-bold bg-[#0b1120] border border-cyan-800 px-4 py-1.5 rounded-full text-sm shadow-lg"></div>
            </div>
        </header>
        <main class="flex-1 overflow-hidden p-2 flex flex-col items-center justify-center relative z-10 text-center">
            <div class="image-display-area group">
                <img id="student-image" src="" draggable="false" class="shadow-[0_0_50px_rgba(0,0,0,0.9)] border-2 border-slate-700 rounded-xl select-none pointer-events-none">
                <div id="student-hotspot" class="absolute hotspot-play" onclick="handleImageClick()"></div>
            </div>
            <div id="student-hint-text" class="mt-3 text-slate-500 theme-font text-xs tracking-widest uppercase text-center opacity-60"></div>
        </main>
    </div>

    <!-- מודאל שאלות -->
    <div id="modal-lock" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md">
        <div class="bg-slate-900 p-8 rounded-2xl border border-cyan-800 max-w-md w-full text-center relative overflow-hidden">
            <h2 class="theme-font text-2xl font-bold text-cyan-400 mb-6 tracking-widest uppercase">הזנת קוד גישה</h2>
            <p id="modal-question" class="text-lg mb-8 leading-relaxed text-slate-300 bg-slate-800/50 p-6 rounded-lg border border-slate-700"></p>
            <div class="space-y-6">
                <input id="modal-input" type="text" placeholder="..." autocomplete="off" class="w-full bg-[#0b1120] border-2 border-slate-700 focus:border-cyan-500 rounded-xl px-6 py-4 text-center text-2xl theme-font text-cyan-300 font-bold outline-none">
                <div id="modal-feedback" class="hidden font-bold py-2 rounded-lg text-sm theme-font"></div>
                <div class="flex gap-4">
                    <button onclick="checkAnswer()" class="flex-1 bg-cyan-700 hover:bg-cyan-600 text-white font-bold py-4 rounded-xl transition shadow-lg text-lg uppercase">אימות</button>
                    <button onclick="closeModal()" class="px-6 bg-slate-800 text-slate-400 rounded-xl border border-slate-700"><i class="fas fa-times"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- מסך ניצחון -->
    <div id="screen-victory" class="hidden fixed inset-0 bg-[#0b1120] z-[200] flex flex-col items-center justify-center text-center p-8 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 to-[#0b1120]">
        <div class="relative mb-10 text-center"><i class="fas fa-check text-9xl text-cyan-400 drop-shadow-[0_0_25px_rgba(6,182,212,0.8)]"></i></div>
        <h1 class="theme-font text-7xl font-bold text-cyan-400 mb-6 uppercase tracking-widest">יצאתם לחופשי! 🏆</h1>
        <button onclick="location.reload()" class="bg-transparent border-2 border-cyan-600 text-cyan-400 px-10 py-3 rounded-full font-bold text-lg hover:bg-cyan-900/30 transition">חזרה למסך הבית</button>
    </div>

    <script>
        // --- לוגיקה פנימית ---
        let levels = [];
        let currentLevelIndex = 0;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let userRole = null;

        const screens = {
            intro: document.getElementById('screen-intro'),
            teacher: document.getElementById('screen-teacher'),
            student: document.getElementById('screen-student'),
            victory: document.getElementById('screen-victory'),
            modal: document.getElementById('modal-lock'),
            loading: document.getElementById('loading-screen')
        };

        const teacherDOM = {
            sidebar: document.getElementById('teacher-sidebar-levels'),
            mainContent: document.getElementById('teacher-main-content'),
            img: document.getElementById('teacher-image'),
            hotspot: document.getElementById('teacher-hotspot'),
            inputQ: document.getElementById('teacher-input-question'),
            inputA: document.getElementById('teacher-input-answer'),
            editPanel: document.getElementById('teacher-edit-panel'),
            navMsg: document.getElementById('teacher-nav-msg'),
            navText: document.getElementById('nav-msg-text'),
            typeBtns: {
                intro: document.getElementById('type-btn-intro'),
                puzzle: document.getElementById('type-btn-puzzle'),
                end: document.getElementById('type-btn-end')
            }
        };

        const studentDOM = {
            progress: document.getElementById('student-progress-text'),
            img: document.getElementById('student-image'),
            hotspot: document.getElementById('student-hotspot'),
            hint: document.getElementById('student-hint-text'),
            modalInput: document.getElementById('modal-input'),
            modalQ: document.getElementById('modal-question'),
            modalFeedback: document.getElementById('modal-feedback')
        };

        // התראות
        function customAlert(msg, isError = true) {
            const toast = document.createElement('div');
            toast.className = `fixed top-10 left-1/2 transform -translate-x-1/2 px-6 py-4 rounded-xl shadow-2xl font-bold text-white z-[9999] transition-all duration-500 opacity-0 flex items-center gap-3 ${isError ? 'bg-red-600 border-2 border-red-400' : 'bg-green-600 border-2 border-green-400'}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} text-xl"></i> <span>${msg}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.replace('opacity-0', 'opacity-100'), 50);
            setTimeout(() => {
                toast.classList.replace('opacity-100', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        function showLoading(show, text = "טוען...") {
            document.getElementById('loading-text').innerText = text;
            screens.loading.classList.toggle('hidden', !show);
        }

        function showScreen(screenName) {
            Object.values(screens).forEach(s => { if (s && s !== screens.loading) s.classList.add('hidden'); });
            if (screens[screenName]) screens[screenName].classList.remove('hidden');
        }

        // --- ZIP לוגיקה ---
        
        // יצירת ZIP ושמירה מקומית
        async function saveToZip() {
            if (levels.length === 0) {
                customAlert("לא ניתן לשמור חדר ריק", true);
                return;
            }

            showLoading(true, "יוצר קובץ ZIP...");
            await new Promise(r => setTimeout(r, 100)); // רענון UI

            try {
                const zip = new JSZip();
                const configData = [];

                for (let i = 0; i < levels.length; i++) {
                    const lvl = levels[i];
                    // השתמש בנתונים המקוריים ששמרנו
                    const base64String = lvl.originalData || lvl.image; 
                    
                    // חילוץ הנתונים הנקיים של ה-Base64
                    const commaIdx = base64String.indexOf(',');
                    const base64Content = base64String.substring(commaIdx + 1);
                    
                    // מציאת סיומת הקובץ
                    let extension = "gif"; // default
                    const mimeMatch = base64String.match(/data:image\/(.+?);/);
                    if (mimeMatch && mimeMatch[1]) {
                        extension = mimeMatch[1];
                    }

                    const fileName = `image_${i}.${extension}`;
                    
                    // הוספת התמונה ל-ZIP
                    zip.file(fileName, base64Content, {base64: true});

                    // בניית קובץ הקונפיגורציה
                    configData.push({
                        id: lvl.id,
                        type: lvl.type,
                        question: lvl.question,
                        answer: lvl.answer,
                        hotspot: lvl.hotspot,
                        imageFile: fileName // הפניה לשם התמונה ב-ZIP
                    });
                }

                // הוספת קובץ JSON ל-ZIP
                zip.file("config.json", JSON.stringify(configData));

                // יצירת קובץ ZIP והורדה
                const zipContent = await zip.generateAsync({type:"blob"});
                const link = document.createElement('a');
                link.href = URL.createObjectURL(zipContent);
                link.download = 'escape_room_game.zip';
                link.click();
                
                customAlert("בהצלחה! קובץ המשחק נשמר.", false);
            } catch (e) {
                console.error(e);
                customAlert("שגיאה ביצירת הקובץ.", true);
            } finally {
                showLoading(false);
            }
        }

        // טעינת ZIP מסטודענט או לערער
        async function handleLoadZip(event, role) {
            const file = event.target.files[0];
            if (!file) return;
            
            showLoading(true, "קורא את קובץ ה-ZIP...");
            
            try {
                const zip = new JSZip();
                const zipContents = await zip.loadAsync(file);
                
                // חיפוש קובץ קונפיגורציה
                const configFile = zipContents.file("config.json");
                if (!configFile) {
                    throw new Error("לא נמצא קובץ config.json");
                }
                
                const configText = await configFile.async("string");
                const configData = JSON.parse(configText);
                
                // יצירת Object URLs לתמונות מה-ZIP (מניעת שימוש ב-Base64 ב-DOM)
                levels = [];
                for (let i = 0; i < configData.length; i++) {
                    const item = configData[i];
                    const imgFile = zipContents.file(item.imageFile);
                    
                    if (imgFile) {
                        const imgBlob = await imgFile.async("blob");
                        const blobUrl = URL.createObjectURL(imgBlob); 
                        item.image = blobUrl;
                        item.preview = blobUrl; // שימוש ב-Blob כברירת מחדל לתצוגה
                        
                        // למורים, אנחנו צריכים לשמור גם את המקור כדי שיוכלו לשמור מחדש
                        if (role === 'TEACHER') {
                            const base64 = await imgFile.async("base64");
                            item.originalData = `data:${imgBlob.type};base64,${base64}`;
                        }
                    }
                    levels.push(item);
                }

                currentLevelIndex = 0;
                userRole = role;
                
                if(role === 'TEACHER') { 
                    showScreen('teacher'); 
                    renderTeacherUI(); 
                } else { 
                    showScreen('student'); 
                    renderStudentUI(); 
                }
                
                customAlert("המשחק נטען בהצלחה", false);
            } catch (err) {
                console.error(err);
                customAlert("שגיאה. קובץ ZIP פגום.", true);
            } finally {
                event.target.value = '';
                showLoading(false);
            }
        }

        // --- ניהול לוגיקה עבור המורה ---

        async function processFile(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result); // Base64
                reader.readAsDataURL(file);
            });
        }

        async function handleNewGame(event) {
            const file = event.target.files[0];
            if (!file) return;
            showLoading(true, "מעבד קובץ...");
            await new Promise(r => setTimeout(r, 50));
            
            userRole = 'TEACHER';
            levels = [];
            const imgData = await processFile(file);
            const previewUrl = URL.createObjectURL(file); // יצירת URL מהיר לתצוגה המקדימה
            
            levels.push({
                id: Date.now(),
                image: imgData,
                originalData: imgData,
                preview: previewUrl, 
                type: 'intro',
                question: '',
                answer: '',
                hotspot: { x: 40, y: 40, width: 20, height: 20 }
            });
            currentLevelIndex = 0;
            showScreen('teacher');
            renderTeacherUI();
            showLoading(false);
            event.target.value = '';
        }

        async function addLevelFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            showLoading(true, "מוסיף תמונה...");
            await new Promise(r => setTimeout(r, 50));
            
            const imgData = await processFile(file);
            const previewUrl = URL.createObjectURL(file);
            
            const newLevel = {
                id: Date.now(),
                image: imgData,
                originalData: imgData,
                preview: previewUrl,
                type: 'puzzle',
                question: 'מהו הקוד?',
                answer: '',
                hotspot: { x: 40, y: 40, width: 20, height: 20 }
            };
            levels.splice(currentLevelIndex + 1, 0, newLevel);
            currentLevelIndex++;
            renderTeacherUI();
            showLoading(false);
            event.target.value = '';
        }

        async function replaceImageFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            showLoading(true, "מחליף תמונה...");
            await new Promise(r => setTimeout(r, 50));
            
            const imgData = await processFile(file);
            const previewUrl = URL.createObjectURL(file);
            
            levels[currentLevelIndex].image = imgData;
            levels[currentLevelIndex].originalData = imgData;
            levels[currentLevelIndex].preview = previewUrl;
            
            renderTeacherUI();
            showLoading(false);
            event.target.value = '';
        }

        function setLevelType(type) {
            if (!levels[currentLevelIndex]) return;
            levels[currentLevelIndex].type = type;
            renderTeacherUI();
        }

        function renderTeacherUI() {
            if (levels.length === 0) {
                teacherDOM.mainContent.style.visibility = 'hidden';
                teacherDOM.sidebar.innerHTML = '<p class="text-slate-500 text-center text-sm mt-10">אין שקפים</p>';
                return;
            }
            teacherDOM.mainContent.style.visibility = 'visible';
            
            teacherDOM.sidebar.innerHTML = '';
            levels.forEach((lvl, idx) => {
                const div = document.createElement('div');
                div.className = `group relative p-2 rounded-xl border-2 cursor-pointer transition-all ${currentLevelIndex === idx ? 'active-level border-cyan-400' : 'bg-slate-800 border-slate-700'}`;
                div.onclick = () => { currentLevelIndex = idx; renderTeacherUI(); };
                
                // שימוש ב-Blob URL (preview) כדי למנוע קריסה בתצוגה המקדימה ולהראות תמיד את התמונה
                const imgSrc = lvl.preview || lvl.image;
                
                div.innerHTML = `
                    <div class="w-full h-24 bg-center bg-cover bg-no-repeat rounded-md mb-2 bg-black shadow-inner border border-slate-600" style="background-image: url('${imgSrc}')">
                    </div>
                    <div class="text-[12px] font-bold text-center uppercase text-slate-300">שקף ${idx + 1}</div>
                    <button onclick="event.stopPropagation(); removeLevel(${idx})" class="absolute top-3 left-3 bg-red-600/80 p-1.5 rounded opacity-0 group-hover:opacity-100 transition hover:scale-110 shadow-lg"><i class="fas fa-trash text-xs text-white"></i></button>`;
                teacherDOM.sidebar.appendChild(div);
            });

            const current = levels[currentLevelIndex];
            if (teacherDOM.img.src !== (current.preview || current.image)) {
                teacherDOM.img.src = (current.preview || current.image);
            }
            
            Object.keys(teacherDOM.typeBtns).forEach(key => {
                if(teacherDOM.typeBtns[key]) teacherDOM.typeBtns[key].classList.remove('active');
            });
            const currentType = current.type || 'puzzle';
            if (teacherDOM.typeBtns[currentType]) teacherDOM.typeBtns[currentType].classList.add('active');

            updateHotspotVisual(teacherDOM.hotspot, current.hotspot);

            if (currentType === 'puzzle') {
                teacherDOM.editPanel.classList.remove('hidden');
                teacherDOM.navMsg.classList.add('hidden');
                teacherDOM.inputQ.value = current.question || "";
                teacherDOM.inputA.value = current.answer || "";
            } else {
                teacherDOM.editPanel.classList.add('hidden');
                teacherDOM.navMsg.classList.remove('hidden');
                teacherDOM.navText.innerHTML = currentType === 'intro' ? "סמנו אזור שקוף למעבר לשקף הבא" : "סמנו אזור שקוף לסיום המשחק";
            }
        }

        function removeLevel(index) {
            levels.splice(index, 1);
            if (currentLevelIndex >= levels.length && levels.length > 0) currentLevelIndex = levels.length - 1;
            renderTeacherUI();
        }

        // --- לוגיקת משחק (תלמיד) ---

        function handleImageClick() {
            const level = levels[currentLevelIndex];
            if (!level) return;
            if (level.type === 'intro') {
                if (currentLevelIndex < levels.length - 1) { currentLevelIndex++; renderStudentUI(); }
                else showScreen('victory');
            } else if (level.type === 'end') showScreen('victory');
            else openModal();
        }

        function openModal() {
            const current = levels[currentLevelIndex];
            studentDOM.modalQ.innerText = current.question || "מהו הקוד?";
            studentDOM.modalInput.value = "";
            studentDOM.modalFeedback.className = 'hidden';
            showScreen('modal');
            setTimeout(() => studentDOM.modalInput.focus(), 100);
        }

        function closeModal() { showScreen('student'); }

        function renderStudentUI() {
            const current = levels[currentLevelIndex];
            if (!current) return;
            const puzzleCount = levels.filter(l => l.type === 'puzzle').length;
            const currentPuzzleIdx = levels.slice(0, currentLevelIndex + 1).filter(l => l.type === 'puzzle').length;

            studentDOM.progress.innerText = (current.type === 'puzzle') ? `חידה ${currentPuzzleIdx} מתוך ${puzzleCount}` : (current.type === 'intro' ? 'פתיחה' : 'סיום');
            studentDOM.hint.innerText = (current.type === 'puzzle') ? "מצאו את המנעול בתוך ה-GIF ולחצו עליו" : "לחצו על האזור השקוף להמשך";
            
            studentDOM.img.src = current.preview || current.image;
            updateHotspotVisual(studentDOM.hotspot, current.hotspot);
        }

        function updateHotspotVisual(el, data) {
            if (!el || !data) return;
            el.style.top = data.y + "%"; el.style.left = data.x + "%";
            el.style.width = data.width + "%"; el.style.height = data.height + "%";
        }

        function startHotspotDraw(e) {
            if(userRole !== 'TEACHER') return;
            e.preventDefault();
            const rect = teacherDOM.img.getBoundingClientRect();
            dragStart.x = ((e.clientX - rect.left) / rect.width) * 100;
            dragStart.y = ((e.clientY - rect.top) / rect.height) * 100;
            isDragging = true;
            levels[currentLevelIndex].hotspot = { x: dragStart.x, y: dragStart.y, width: 0, height: 0 };
            updateHotspotVisual(teacherDOM.hotspot, levels[currentLevelIndex].hotspot);
        }

        function updateHotspotDraw(e) {
            if(!isDragging) return;
            const rect = teacherDOM.img.getBoundingClientRect();
            const curX = ((e.clientX - rect.left) / rect.width) * 100;
            const curY = ((e.clientY - rect.top) / rect.height) * 100;
            const x = Math.max(0, Math.min(100, Math.min(dragStart.x, curX)));
            const y = Math.max(0, Math.min(100, Math.min(dragStart.y, curY)));
            levels[currentLevelIndex].hotspot = { 
                x: x, y: y,
                width: Math.min(Math.abs(curX - dragStart.x), 100 - x),
                height: Math.min(Math.abs(curY - dragStart.y), 100 - y)
            };
            updateHotspotVisual(teacherDOM.hotspot, levels[currentLevelIndex].hotspot);
        }

        function checkAnswer() {
            const current = levels[currentLevelIndex];
            const input = studentDOM.modalInput.value.trim().toLowerCase();
            const correct = (current.answer || "").trim().toLowerCase();
            const fb = studentDOM.modalFeedback;
            
            if (input === correct || (correct.length > 2 && input.includes(correct))) {
                fb.innerText = "נכון! המנעול נפתח.";
                fb.className = "mt-2 text-green-400 block font-bold";
                fb.classList.remove('hidden');
                setTimeout(() => { 
                    closeModal(); 
                    if (currentLevelIndex < levels.length - 1) { currentLevelIndex++; renderStudentUI(); }
                    else showScreen('victory');
                }, 1000);
            } else {
                fb.innerText = "לא נכון. נסו שוב!";
                fb.className = "mt-2 text-red-400 block font-bold animate-shake";
                fb.classList.remove('hidden');
                studentDOM.modalInput.classList.add('animate-shake');
                setTimeout(() => studentDOM.modalInput.classList.remove('animate-shake'), 500);
            }
        }

        function previewGame() {
            if (levels.length === 0) return;
            const oldIdx = currentLevelIndex;
            currentLevelIndex = 0;
            document.getElementById('btn-back-to-edit').classList.remove('hidden');
            renderStudentUI();
            showScreen('student');
            window._oldIdx = oldIdx;
        }

        function returnToEditor() { 
            currentLevelIndex = window._oldIdx || 0;
            showScreen('teacher'); 
            renderTeacherUI(); 
        }

        window.onmouseup = () => isDragging = false;
        teacherDOM.inputQ.oninput = (e) => { if(levels[currentLevelIndex]) levels[currentLevelIndex].question = e.target.value; };
        teacherDOM.inputA.oninput = (e) => { if(levels[currentLevelIndex]) levels[currentLevelIndex].answer = e.target.value; };
        studentDOM.modalInput.onkeypress = (e) => { if (e.key === 'Enter') checkAnswer(); };
    </script>
</body>
</html>
